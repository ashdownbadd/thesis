<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@100;300;400;500;700;900&display=swap">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon_planet.jpg">
    <title>Get Started</title>
    <style>
        body {
            font-family: 'Roboto Flex', sans-serif; /* Updated to use Roboto Flex */
            background-color: white;
            margin: 0;
            padding: 0; /* Remove padding */
            display: flex; /* Use flexbox for centering */
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            height: 100vh; /* Full viewport height */
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            width: 100%; /* Ensure the container is responsive */
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .bio-section {
            padding: 20px;
            flex: 1;
        }

        .bio-section h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .bio-section p {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #333;
        }

        .image-section {
            flex: 1;
        }

        .image-section img {
    width: 380px; /* Set a fixed width */
    height: 380px; /* Set a fixed height */
    object-fit: cover; /* Ensures the image covers the box without distortion */
    border-radius: 20px 100px;
}


.custom-button {
    background-color: #8F66E4; /* Light gray background */
    color: #1a1a2e; /* Dark navy text */
    font-family: Arial, sans-serif;
    font-weight: bold;
    font-size: 14px;
    padding: 10px;
    width: 150px; /* Adjust the width as needed */
    border: 2px solid #8F66E4; /* Inner dark navy border */
    position: relative;
    text-transform: uppercase;
    transition: all 0.3s ease;
    cursor: pointer;
    display: inline-block;
    text-align: center; /* Centers the text */
    z-index: 1; /* Keeps the button text above the borders */
}

.custom-button::before {
    content: '';
    position: absolute;
    top: -6px;
    left: -6px;
    right: -6px;
    bottom: -6px;
    border: 2px solid #8F66E4; /* Outer dark navy border */
    z-index: -1; /* Ensures the outer border is behind the button */
}


.custom-button:hover {
    background-color: #f5f5f5; /* Lighter gray on hover */
}
    </style>
</head>
<body>
    <div class="container">
        <div class="bio-section">
            <h1>Get Started</h1>
            <p>To start using the <b>Student Location Tracking System</b>, students need to register and grant location access. Admins can then monitor student locations in real-time.
            </p>
            <br>
            <br>
            <br>
            
            <button class="custom-button" onclick="window.location.href='reg.html'">REGISTER HERE</button>

        </div>
        <div class="image-section">
            <img src="color-css/scene1.jpg">
        </div>
    </div>
</body>
</html>
