<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Student Registration Form</title>
    <!-- Mobile Specific Metas -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <!-- Font-->
    <link rel="stylesheet" type="text/css" href="css/montserrat-font.css">
    <link rel="stylesheet" type="text/css" href="fonts/material-design-iconic-font/css/material-design-iconic-font.min.css">
    <!-- Main Style Css -->
    <link rel="stylesheet" href="registration.css"/>
</head>
<body class="form-v10">
    <div class="page-content">
        <div class="form-v10-content">
            <form class="form-detail" action="#" method="post" id="myform">
                <div class="form-left">
                    <h2>Personal Information</h2>
                    <div class="form-row form-row-1">
                        <input type="text" name="last_name" id="last_name" class="input-text" placeholder="Last Name" required>
                    </div>
                    <div class="form-row form-row-2">
                        <input type="text" name="first_name" id="first_name" class="input-text" placeholder="First Name" required>
                    </div>
                    <div class="form-row">
                        <input type="text" name="middle_name" id="middle_name" class="input-text" placeholder="Middle Name" required>
                    </div>
                    <div class="form-row">
                        <input type="text" name="extension" id="extension" class="input-text" placeholder="Extension (If Any)">
                    </div>
                    <div class="form-row">
                        <input type="text" name="mobile_no" id="mobile_no" class="input-text" placeholder="Mobile No." required>
                    </div>
                    <div class="form-row form-row-4">
                        <input type="email" name="email" id="email" class="input-text" placeholder="Email" required>
                    </div>
                    <h2>Student Information</h2>
                    <div class="form-row">
                        <input type="text" name="student_no" id="student_no" class="input-text" placeholder="Student No." required>
                    </div>
                    <div class="form-row">
                        <select name="year_level" required>
                            <option value="">Year Level</option>
                            <option value="1st_year">1st Year</option>
                            <option value="2nd_year">2nd Year</option>
                            <option value="3rd_year">3rd Year</option>
                            <option value="4th_year">4th Year</option>
                            <option value="5th_year">5th Year</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <select name="section" required>
                            <option value="">Section</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <select name="program" required>
                            <option value="">Program</option>
                            <option value="BSCS">BS Computer Science</option>
                            <option value="BSIT">BS Information Technology</option>
                            <option value="BSIS">BS Information Systems</option>
                        </select>
                    </div>
                </div>
                <div class="form-right">
                    <h2>Emergency Contact</h2>
                    <div class="form-row">
                        <input type="text" name="full_name" class="full_name" id="full_name" placeholder="Full Name" required>
                    </div>
                    <div class="form-row">
                        <input type="text" name="mobile_no" class="mobile_no" id="mobile_no" placeholder="Mobile No." required>
                    </div>
                    <div class="form-checkbox">
                        <label class="container">
                            <p>I do accept the <a href="#" class="text">Terms and Conditions</a> of your site.</p>
                            <input type="checkbox" name="checkbox">
                            <span class="checkmark"></span>
                        </label>
                    </div>
                    <div class="form-row-last">
                        <input type="submit" name="register" class="register" value="Register Badge">
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
