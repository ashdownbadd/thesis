<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="register.css"> <!-- Link to your CSS file -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
    <div class="formbold-main-wrapper">
        <div class="formbold-form-wrapper">
            <form action="https://formbold.com/s/FORM_ID" method="POST">
                <div class="formbold-form-title">
                    <h2 class="">Register now</h2>
                    <p>
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do
                        eiusmod tempor incididunt.
                    </p>
                </div>
                <h4 class="">Personal Information</h4>
                <br>
                <div class="formbold-mb-3">
                    <input type="text" name="email" id="email" class="formbold-form-input" placeholder="Email Address" />
                </div>
                <div class="formbold-input-flex">
                    <div>
                        <input type="text" name="lastname" id="lastname" class="formbold-form-input" placeholder="Last Name" />
                    </div>
                    <div>
                        <input type="text" name="firstname" id="firstname" class="formbold-form-input" placeholder="First Name" />
                    </div>
                </div>

                <div class="formbold-input-flex">
                    <div>
                        <input type="text" name="middlename" id="middlename" class="formbold-form-input" placeholder="Middle Name" />
                    </div>
                    <div>
                        <input type="text" name="extension" id="extension" class="formbold-form-input" placeholder="Extension" />
                    </div>
                </div>

                <div class="formbold-mb-3">
                    <input type="number" name="mobilenumber" id="mobilenumber" class="formbold-form-input" placeholder="Mobile No." />
                </div>

                <br>
                <h4 class="">Student Information</h4>
                <br>

                <div class="formbold-input-flex">
                    <div>
                        <input type="number" name="studentnumber" id="studentnumber" class="formbold-form-input" placeholder="Student No." />
                    </div>
                    <div>
                        <select name="yearlevel" id="yearlevel" class="formbold-form-input">
                            <option value="">Select Year Level</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                            <option value="5th Year">5th Year</option>
                        </select>
                    </div>
                </div>

                <div class="formbold-input-flex">
                    <div>
                        <select name="section" id="section" class="formbold-form-input">
                            <option value="">Select Section</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                        </select>
                    </div>
                    <div>
                        <select name="program" id="program" class="formbold-form-input">
                            <option value="">Select Program</option>
                            <option value="BS in Nursing">BS in Nursing</option>
                            <option value="BS in Psychology">BS in Psychology</option>
                            <option value="BS in Information Technology">BS in Information Technology</option>
                            <option value="BS in Information System">BS in Information System</option>
                            <option value="BS in Computer Science">BS in Computer Science</option>
                        </select>
                    </div>
                </div>

                <br>
                <h4 class="">Emergency Contact Information</h4>
                <br>

                <div class="formbold-mb-3">
                    <input type="text" name="emergencyemail" id="emergencyemail" class="formbold-form-input" placeholder="Emergency Email Address" />
                </div>

                <div class="formbold-input-flex">
                    <div>
                        <input type="text" name="fullname" id="fullname" class="formbold-form-input" placeholder="Full Name" />
                    </div>
                    <div>
                        <input type="number" name="emergencymobilenumber" id="emergencymobilenumber" class="formbold-form-input" placeholder="Emergency Mobile No." />
                    </div>
                </div>
                <br>

                <div class="formbold-checkbox-wrapper">
                    <label for="supportCheckbox" class="formbold-checkbox-label">
                        <div class="formbold-relative">
                            <input type="checkbox" id="supportCheckbox" class="formbold-input-checkbox" />
                            <div class="formbold-checkbox-inner">
                                <span class="formbold-opacity-0">
                                    <svg width="11" height="8" viewBox="0 0 11 8" fill="none" class="formbold-stroke-current">
                                        <path d="M10.0915 0.951972L10.0867 0.946075L10.0813 0.940568C9.90076 0.753564 9.61034 0.753146 9.42927 0.939309L4.16201 6.22962L1.58507 3.63469C1.40401 3.44841 1.11351 3.44879 0.932892 3.63584C0.755703 3.81933 0.755703 4.10875 0.932892 4.29224L0.932878 4.29225L0.934851 4.29424L3.58046 6.95832C3.73676 7.11955 3.94983 7.2 4.1473 7.2C4.36196 7.2 4.55963 7.11773 4.71406 6.9584L10.0468 1.60234C10.2436 1.4199 10.2421 1.1339 10.0915 0.951972ZM4.2327 6.30081L4.2317 6.2998C4.23206 6.30015 4.23237 6.30049 4.23269 6.30082L4.2327 6.30081Z" stroke-width="0.4"></path>
                                    </svg>
                                </span>
                            </div>
                        </div>
                        I agree to the defined <a href="#">terms, conditions, and policies</a>
                    </label>
                </div>

                <button class="formbold-btn">Register</button>
            </form>
        </div>
    </div>
</body>
</html>
