    body {
      height: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
      font-family: 'Poppins', sans-serif; /* Apply Google Font */
      overflow: hidden; /* Prevent scrolling */
      background-image: url('background.svg');
      background-size: cover;
    }

    .circular-menu {
      position: fixed;
      bottom: 1em;
      right: 1em;
      z-index: 2;
    }

    .circular-menu .floating-btn {
        display: block;
        width: 3.5em;
        height: 3.5em;
        border-radius: 50%;
        background-color: hsl(4, 98%, 60%);
        box-shadow: 0 2px 5px 0 hsla(0, 0%, 0%, .26);  
        color: #161616;
        text-align: center;
        line-height: 3.9;
        cursor: pointer;
        outline: 0;
    }

    .circular-menu.active .floating-btn {
      box-shadow: inset 0 0 3px hsla(0, 0%, 0%, .3);
    }

    .circular-menu .floating-btn:active {
      box-shadow: 0 4px 8px 0 hsla(0, 0%, 0%, .4);
    }

    .circular-menu .floating-btn i {
      font-size: 1.3em;
      transition: transform .2s;  
    }

    .circular-menu.active .floating-btn i {
      transform: rotate(-45deg);
    }

    .circular-menu:after {
      display: block;
      content: ' ';
      width: 3.5em;
      height: 3.5em;
      border-radius: 50%;
      position: absolute;
      top: 0;
      right: 0;
      z-index: -2;
      background-color: hsl(4, 98%, 60%);
      transition: all .3s ease;
    }

    .circular-menu.active:after {
      transform: scale3d(5.5, 5.5, 1);
      transition-timing-function: cubic-bezier(.68, 1.55, .265, 1);
    }

    .circular-menu .items-wrapper {
      padding: 0;
      margin: 0;
    }

    .circular-menu .menu-item {
      position: absolute;
      top: .2em;
      right: .2em;
      z-index: -1;
      display: block;
      text-decoration: none;
      color: hsl(0, 0%, 100%);
      font-size: 1em;
      width: 3em;
      height: 3em;
      border-radius: 50%;
      text-align: center;
      line-height: 3;
      background-color: hsla(0,0%,0%,.1);
      transition: transform .3s ease, background .2s ease;
    }

    .circular-menu .menu-item:hover {
      background-color: hsla(0,0%,0%,.3);
    }

    .circular-menu.active .menu-item {
      transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .circular-menu.active .menu-item:nth-child(1) {
      transform: translate3d(1em,-7em,0);
    }

    .circular-menu.active .menu-item:nth-child(2) {
      transform: translate3d(-3.5em,-6.3em,0);
    }

    .circular-menu.active .menu-item:nth-child(3) {
      transform: translate3d(-6.5em,-3.2em,0);
    }

    .circular-menu.active .menu-item:nth-child(4) {
      transform: translate3d(-7em,1em,0);
    }

    .circular-menu.circular-menu-left {
      right: auto; 
      left: 1em;
    }

    .circular-menu.circular-menu-left .floating-btn {
      background-color: #CFFF5E;
    }

    .circular-menu.circular-menu-left:after {
      background-color: #6D4AD0;
    }

    .circular-menu.circular-menu-left.active .floating-btn i {
      transform: rotate(90deg);
    }

    .circular-menu.circular-menu-left.active .menu-item:nth-child(1) {
      transform: translate3d(-1em,-7em,0);
    }

    .circular-menu.circular-menu-left.active .menu-item:nth-child(2) {
      transform: translate3d(3.5em,-6.3em,0);
    }

    .circular-menu.circular-menu-left.active .menu-item:nth-child(3) {
      transform: translate3d(6.5em,-3.2em,0);
    }

    .circular-menu.circular-menu-left.active .menu-item:nth-child(4) {
      transform: translate3d(7em,1em,0);
    }

    #circularMenu {
      display: none;
    }


.modal {
  font-family: sans-serif;
  display: none; 
  position: fixed;
  z-index: 1000; 
  left: 0;
  top: 0;
  width: 100%; 
  height: 100%; 
  overflow: auto; 
  background-color: rgba(0, 0, 0, 0.5); 
}

.modal-content {
  background-color: white;
  padding: 20px;
  width: 50%;
  max-width: 359px;
  border-radius: 37px;
  text-align: center;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.modal-content p {
  margin-bottom: 30px;
  text-align: center;
}

.modal-content h2{
  margin-top: 0px;
  margin-bottom: 30px;
}

.modal-buttons button {
  background-color: #6D4AD0;
  color: black;
  border: 2px solid black;
  padding: 10px 15px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
}

.modal-buttons .confirm-btn {
  background-color: #6D4AD0;
  color: #161616;
}

.modal-buttons .cancel-btn {
  background-color: transparent;
  color: black;
}

.close {
  display: inline-block;
  font-size: 24px;
  color: grey;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
  position: absolute;
  right: 10px;
  top: 10px;
  font-weight: bold;
}

body .modal {
  z-index: 1000;
}


body.modal-open {
  overflow: hidden;
}

h2 {
  color: black;
}

p{
  color: black;
}

.emergency-notification {
  display: flex;
  flex-direction: column; 
  justify-content: space-between; 
  align-items: center; 
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: #FFFFFF;
  color: #1E1915;
  padding: 20px 30px;
  border-radius: 39px;
  height: 200px;
  width: 250px;
  z-index: 1002; 
  opacity: 0;
  transition: opacity 0.5s ease-in-out;
  font-family: sans-serif; 
  font-size: 18px; 
}


.emergency-notification.show {
  opacity: 1;
}

.dismiss-btn {
    margin-left: 20px;

    border: none;

    padding: 5px 10px;

    font-size: 14px;

}

.room {

}

#notification-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000; /* Ensures it appears above other elements */
    pointer-events: none; /* Allows clicks to pass through */
}

.notification-box {
    background-color: #EEBF00; /* Yellow background for visibility */
    color: black; /* Dark text color */

    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5); /* Darker shadow for more depth */

    align-items: center; /* Center items horizontally */
    text-align: center; /* Center text */

.notification-box h4 {
    margin: 0 0 5px;

    width: 100%;
}

.notification-box p {
    margin: 0;

}
.track-button {
    background-color: red; /* Green background */
    color: white; /* White icon color */

    display: inline-flex; /* Flexbox for icon centering */
    align-items: center; /* Center icon vertically */
    justify-content: center; /* Center icon horizontally */

    border-radius: 50%; /* Makes the button circular */
    width: 50px; /* Set width */
    height: 50px; /* Set height */
    font-size: 24px; /* Increase icon size */
    transition: background-color 0.3s; /* Smooth background change on hover */
}

.track-button:hover {
    background-color: #45a049; /* Darker green on hover */
}

/* Optional: Center the icon within the button */

    margin: 0; /* Remove margin if any */
}

  <script>

const signOutBtn = document.getElementById('signOutBtn');
const logoutModal = document.getElementById('logoutModal');
const confirmLogout = document.getElementById('confirmLogout');
const cancelLogout = document.getElementById('cancelLogout');
const modalClose = document.getElementById("modalClose");


signOutBtn.addEventListener('click', (e) => {
  e.preventDefault(); 
  logoutModal.style.display = 'block';
  document.body.classList.add('modal-open'); 
});

    // Close the modal when the 'x' button is clicked
    modalClose.addEventListener("click", () => {
        logoutModal.style.display = "none";
    });

confirmLogout.addEventListener('click', () => {

  window.location.href = 'signin.html';
});

cancelLogout.addEventListener('click', () => {
  logoutModal.style.display = 'none';
  document.body.classList.remove('modal-open'); 
});

window.addEventListener('click', (event) => {
  if (event.target == logoutModal) {
    logoutModal.style.display = 'none';
    document.body.classList.remove('modal-open');
  }
});

window.onload = () => {
  fetchStudents(); 
};


let lastTimestamp = localStorage.getItem('lastTimestamp') || null;


function fetchAlerts() {
    fetch('get_alerts.php')
        .then(response => response.json())
        .then(data => {
            data.forEach(alert => {
                if (!lastTimestamp || new Date(alert.timestamp) > new Date(lastTimestamp)) {
                    displayAlert(alert);
                    lastTimestamp = alert.timestamp;
                    localStorage.setItem('lastTimestamp', lastTimestamp);
                }
            });
        })
        .catch(error => console.error('Error fetching alerts:', error));
}

function displayAlert(alert) {
    const alertContent = `
        EMERGENCY ALERT
        FROM: ${alert.student_no}
        NAME: ${alert.first_name} ${alert.middle_name} ${alert.last_name}
        AT: ${alert.timestamp}
    `;

    showPopup(alertContent);
}



function showPopup(message) {
    const notification = document.createElement('div');
    notification.className = 'emergency-notification';

        const alertIcon = document.createElement('i');
    alertIcon.className = 'fa-solid fa-triangle-exclamation';
    notification.appendChild(alertIcon); 
    
    const messageText = document.createElement('span');
    messageText.innerText = message;
    notification.appendChild(messageText);

    const dismissButton = document.createElement('button');
    dismissButton.className = 'dismiss-btn';
    dismissButton.innerText = 'Dismiss';
    dismissButton.addEventListener('click', () => {
        notification.classList.remove('show');
        setTimeout(() => {
            document.body.removeChild(notification);
        }, 500); 
    });
    notification.appendChild(dismissButton);

    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.classList.add('show');
    }, 100); 
}


setInterval(fetchAlerts, 500);

fetchAlerts();

  function showMap(mapId) {
    const maps = document.querySelectorAll('.map');
    maps.forEach(map => map.classList.remove('active'));

    const activeMap = document.getElementById(mapId);
    activeMap.classList.add('active');
}

document.addEventListener("DOMContentLoaded", () => {
    const rightPanel = document.getElementById("rightPanel");

    // Check the saved state in localStorage
    const savedState = localStorage.getItem("panelState");

    // If the saved state is 'collapsed', apply the collapsed class
    if (savedState === "collapsed") {
        rightPanel.classList.add("collapsed");
    }

    // Toggle function to open/close the panel
    window.togglePanel = function() {
        rightPanel.classList.toggle("collapsed");
        // Save the current state to localStorage
        const isCollapsed = rightPanel.classList.contains("collapsed");
        localStorage.setItem("panelState", isCollapsed ? "collapsed" : "open");
    };
});


function fetchEmergencyReports() {
    fetch('fetch_reports.php') // Adjust this to your server endpoint
        .then(response => response.json())
        .then(data => {
            const tableBody = document.getElementById('reportTableBody');
            tableBody.innerHTML = ''; // Clear existing rows
            data.forEach(report => {
                const row = document.createElement('tr');
                row.innerHTML = `
                                    <td>${report.report_date}</td>

                    <td>${report.full_name}</td>
                    <td>${report.mobile_no}</td>
                    <td>${report.email}</td>
                    <td>${report.year_level}</td>
                    <td>${report.section}</td>
                    <td>${report.program}</td>
                    <td>${report.emergency_type}</td>
                    <td>${report.emergency_name}</td>
                    <td>${report.emergency_no}</td>
                `;
                tableBody.appendChild(row);
            });
        })
        .catch(error => console.error('Error fetching emergency reports:', error));
}

fetchEmergencyReports();


// Connect to WebSocket server
const ws = new WebSocket('ws://localhost:8080');

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === 'emergency') {
        createNotificationBox(data);
    }
};

ws.onerror = (error) => {
    console.error("WebSocket error:", error);
};

// Function to create a single notification box
function createNotificationBox(data) {
    const container = document.getElementById('notification-container');

    // Clear any existing notification
    container.innerHTML = '';

    // Create a new notification box
    const notificationBox = document.createElement('div');
    notificationBox.classList.add('notification-box');
    
    // Add content to the notification box
    notificationBox.innerHTML = `
        <h4>Alert: ${data.emergencyType}</h4>
        <p><strong>Name:</strong> ${data.last_name}, ${data.first_name} ${data.middle_name} ${data.extension}</p>
        <p><strong>Section:</strong> ${data.section}</p>
        <p><strong>Year Level:</strong> ${data.year_level}</p>
        <p><strong>Contact:</strong> ${data.mobile_no}</p>
        <button id="trackLocation" class="track-button">
            <i class="fas fa-map-marker-alt"></i> <!-- Font Awesome map marker icon -->
        </button>
    `;

    // Add the notification to the container
    container.appendChild(notificationBox);

    // Automatically remove the notification after 10 seconds
    setTimeout(() => {
        notificationBox.remove();
    }, 10000);
}



</script>
